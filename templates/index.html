<!DOCTYPE html>
<html>
<head>
<title>Emotion Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    overflow: hidden;

    /* Beach background */
    background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
}

/* Overlay for contrast */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
}

/* Floating emojis */
.emoji-float {
    position: absolute;
    font-size: 35px;
    opacity: 0.6;
    animation: float 8s ease-in-out infinite;
}

.e1 { top: 10%; left: 10%; }
.e2 { top: 75%; left: 15%; }
.e3 { top: 20%; right: 15%; }
.e4 { bottom: 10%; right: 10%; }

@keyframes float {
    0% { transform: translateY(0);}
    50% { transform: translateY(-30px);}
    100% { transform: translateY(0);}
}

/* CENTER CARD */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
    color: white;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);

    animation: fadeIn 1s ease;
}

/* Fade animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -60%);}
    to { opacity: 1; transform: translate(-50%, -50%);}
}

/* Input */
textarea {
    width: 100%;
    height: 100px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    outline: none;
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Result */
.result {
    margin-top: 20px;
}

.emoji {
    font-size: 50px;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    from { transform: translateY(0);}
    to { transform: translateY(-10px);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- Floating emojis -->
<div class="emoji-float e1">😢</div>
<div class="emoji-float e2">😍</div>
<div class="emoji-float e3">😡</div>
<div class="emoji-float e4">😨</div>

<!-- Center card -->
<div class="card">
    <h2>🤖 Emotion Analyzer</h2>

    <form method="POST" action="/predict">
        <textarea name="text" placeholder="Type your feelings..."></textarea>
        <br>
        <button type="submit">Analyze</button>
    </form>

    {% if prediction %}
    <div class="result">

        {% if prediction == "sadness" %}
            <div class="emoji">😢</div>
        {% elif prediction == "joy" %}
            <div class="emoji">😍</div>
        {% elif prediction == "anger" %}
            <div class="emoji">😡</div>
        {% elif prediction == "fear" %}
            <div class="emoji">😨</div>
        {% else %}
            <div class="emoji">😐</div>
        {% endif %}

        <p><b>{{ prediction }}</b></p>
        <p>Confidence: {{ confidence }}%</p>

    </div>
    {% endif %}
</div>

</body>
</html>
